name: CI

on:
  push:
    branches: [main, 'claude/**', 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed lib test

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: ignore

      - name: Build debug APK
        run: flutter build apk --debug --target-platform android-arm64

      - name: Guard against secret leaks (no real Firebase keys committed)
        run: |
          set -e
          if grep -RIn -E "blokz|AIzaSy[A-Za-z0-9_-]{33}" \
              --include="*.json" \
              --include="*.dart" \
              --include="*.kt" \
              android lib 2>/dev/null \
              | grep -v "YOUR_FIREBASE_API_KEY"; then
            echo "::error::Possible leaked Firebase keys or 'blokz' references."
            exit 1
          fi
          echo "Secret guard passed."
