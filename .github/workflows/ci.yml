name: CI

on:
  push:
    branches: [main, 'claude/**', 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting (lib + test + tool)
        run: dart format --set-exit-if-changed lib test tool

      - name: Static analysis
        # `flutter analyze` defaults to --fatal-infos on Flutter 3.x stable, so
        # advisory style nits would fail the build. We require errors and
        # warnings to be clean (those genuinely block release) but tolerate
        # info-level lints — they're suggestions, not blockers.
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Outdated dependency report (advisory)
        run: flutter pub outdated --no-dev-dependencies --no-dependency-overrides --color || true

      - name: Manifest sanity check (deep-link host matches app.host)
        shell: bash
        run: |
          set -e
          host=$(grep -E '^\s+host:' assets/webview_config.yaml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          # Skip when the YAML is still on a template default. Forks set the
          # host to their own domain via `dart run tool/configure.dart`, which
          # is what this check guards against forgetting. The unmodified
          # template ships with `flutter.dev` (the demo home url) and the
          # canonical reference uses `YOUR_PRIMARY_HOST_HERE` — neither
          # represents a fork that should have a propagated manifest.
          case "$host" in
            ""|YOUR_PRIMARY_HOST_HERE|flutter.dev)
              echo "skipping: app.host is template default ($host)"
              exit 0
              ;;
          esac
          if ! grep -q "android:host=\"$host\"" android/app/src/main/AndroidManifest.xml; then
            echo "::error file=android/app/src/main/AndroidManifest.xml::deep-link <data android:host> does not contain app.host=$host. Did you run dart run tool/configure.dart?"
            exit 1
          fi
          echo "manifest deep-link host matches app.host ($host)."

      - name: Manifest health (queries placement + sibling order)
        # The <queries> element MUST be a sibling of <application>, not nested
        # inside it; AAPT2 will silently merge but Play Console rejects, and
        # we've regressed this before. Cheap to guard.
        shell: bash
        run: |
          set -e
          python3 - <<'PY'
          import re, sys, pathlib
          path = 'android/app/src/main/AndroidManifest.xml'
          src = pathlib.Path(path).read_text()
          src = re.sub(r'<!--[\s\S]*?-->', '', src)
          m = re.search(r'<application\b[\s\S]*?</application>', src)
          if m and re.search(r'<queries\b', m.group(0)):
              print(f'::error file={path}::<queries> nested inside <application>. Move it to be a sibling.')
              sys.exit(1)
          print('manifest <queries> placement looks OK.')
          PY

      - name: Doctor (advisory; demo placeholders are tolerated)
        # `tool/doctor.dart` exits 1 only on hard fails (missing flutter,
        # missing manifest, etc.). The demo template's `flutter.dev` host and
        # bundled AdMob test ID surface as warns, not fails — so this step
        # stays green for the unmodified template while still catching
        # real misconfigurations a fork is about to push.
        run: dart run tool/doctor.dart --plain || (echo "doctor reported a hard fail; see above"; exit 1)

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: ignore

      - name: Build debug APK
        run: flutter build apk --debug --target-platform android-arm64

      - name: Guard against secret leaks (no real Firebase keys committed)
        run: |
          set -e
          if grep -RIn -E "blokz|AIzaSy[A-Za-z0-9_-]{33}" \
              --include="*.json" \
              --include="*.dart" \
              --include="*.kt" \
              android lib 2>/dev/null \
              | grep -v "YOUR_FIREBASE_API_KEY"; then
            echo "::error::Possible leaked Firebase keys or 'blokz' references."
            exit 1
          fi
          echo "Secret guard passed."
