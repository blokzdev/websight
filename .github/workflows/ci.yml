name: CI

on:
  push:
    branches: [main, 'claude/**', 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting (lib + test + tool)
        run: dart format --set-exit-if-changed lib test tool

      - name: Static analysis
        # `flutter analyze` defaults to --fatal-infos on Flutter 3.x stable, so
        # advisory style nits would fail the build. We require errors and
        # warnings to be clean (those genuinely block release) but tolerate
        # info-level lints — they're suggestions, not blockers.
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Outdated dependency report (advisory)
        run: flutter pub outdated --no-dev-dependencies --no-dependency-overrides --color || true

      - name: Manifest sanity check (deep-link host matches app.host)
        shell: bash
        run: |
          set -e
          host=$(grep -E '^\s+host:' assets/webview_config.yaml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$host" ] || [ "$host" = "YOUR_PRIMARY_HOST_HERE" ]; then
            echo "skipping: app.host is unset / placeholder ($host)"
            exit 0
          fi
          if ! grep -q "android:host=\"$host\"" android/app/src/main/AndroidManifest.xml; then
            echo "::error file=android/app/src/main/AndroidManifest.xml::deep-link <data android:host> does not contain app.host=$host. Did you run dart run tool/configure.dart?"
            exit 1
          fi
          echo "manifest deep-link host matches app.host ($host)."

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: ignore

      - name: Build debug APK
        run: flutter build apk --debug --target-platform android-arm64

      - name: Guard against secret leaks (no real Firebase keys committed)
        run: |
          set -e
          if grep -RIn -E "blokz|AIzaSy[A-Za-z0-9_-]{33}" \
              --include="*.json" \
              --include="*.dart" \
              --include="*.kt" \
              android lib 2>/dev/null \
              | grep -v "YOUR_FIREBASE_API_KEY"; then
            echo "::error::Possible leaked Firebase keys or 'blokz' references."
            exit 1
          fi
          echo "Secret guard passed."
