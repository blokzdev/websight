version: 2
updates:
  # Pub packages (Flutter / Dart)
  - package-ecosystem: pub
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - dart
    commit-message:
      prefix: "deps"
      include: scope

  # Gradle (Android)
  - package-ecosystem: gradle
    directory: "/android"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - android
    commit-message:
      prefix: "deps"
      include: scope

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "deps"
      include: scope
