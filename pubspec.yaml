name: websight
description: Declarative Android WebView app shell driven by a single webview_config.yaml.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  camera: ^0.11.3
  cupertino_icons: ^1.0.2
  device_info_plus: ^12.2.0
  firebase_analytics: ^12.0.3
  firebase_core: ^4.2.0
  firebase_crashlytics: ^5.0.3
  firebase_messaging: ^16.0.3
  flutter:
    sdk: flutter
  go_router: ^16.3.0
  google_fonts: ^6.3.2
  google_mlkit_barcode_scanning: ^0.14.1
  google_mobile_ads: ^6.0.0
  image_picker: ^1.0.7
  in_app_purchase: ^3.2.0
  in_app_review: ^2.0.9
  in_app_update: ^4.2.2
  json_annotation: ^4.8.1
  path_provider: ^2.1.2
  permission_handler: ^12.0.1
  provider: ^6.1.1
  share_plus: ^12.0.1
  shared_preferences: ^2.3.0
  url_launcher: ^6.2.5
  webview_flutter: ^4.7.0
  webview_flutter_android: ^4.0.0
  yaml: ^3.1.2

dev_dependencies:
  build_runner: ^2.4.8
  change_app_package_name: ^1.5.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/website/css/
    - assets/offline/
