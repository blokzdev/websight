name: websight
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  yaml: ^3.1.2
  provider: ^6.1.1
  go_router: ^16.3.0
  webview_flutter: ^4.0.0
  webview_flutter_android: any
  google_mobile_ads: ^6.0.0
  in_app_update: ^4.2.2
  firebase_core: ^4.2.0
  firebase_crashlytics: ^5.0.3
  firebase_analytics: ^12.0.3
  path_provider: ^2.1.2
  permission_handler: ^12.0.1
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  json_annotation: ^4.8.1
  google_fonts: ^6.3.2
  camera: ^0.11.3
  google_mlkit_barcode_scanning: ^0.14.1
  share_plus: ^12.0.1
  device_info_plus: ^12.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/website/css/
