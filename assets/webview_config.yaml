app:
  name: "WebSight"
  host: "YOUR_PRIMARY_HOST_HERE" # Auto-synced to allowlists
  home_url: "https://YOUR_PRIMARY_HOST_HERE"
  debug_mode: true

layout:
  style: "drawer" # "drawer", "bottom_tabs", "top_tabs", "none"
  show_app_bar: true
  show_fab: false

navigation:
  external_allowlist:
    - "YOUR_PRIMARY_HOST_HERE" # Must contain app.host
  deep_links:
    enabled: true
    hosts:
      - "YOUR_PRIMARY_HOST_HERE" # Must contain app.host
      - "www.YOUR_PRIMARY_HOST_HERE"

security:
  restrict_to_hosts:
    - "YOUR_PRIMARY_HOST_HERE" # Must contain app.host
  secure_bridge_origin_only: true
  block_cleartext: true

webview_settings:
  user_agent: "WebSight/{version} (Android)"
  javascript_mode: "unrestricted" # "unrestricted" or "disabled"
  dom_storage_enabled: true
  allow_file_access: true
  display_zoom_controls: false
  use_wide_view_port: true
  load_with_overview_mode: true
  debug_webview: false
  inject_css: true
  inject_js: true

js_bridge:
  enabled: true
  name: "WebSightBridge"
  methods:
    - "scanBarcode"
    - "share"
    - "getDeviceInfo"
    - "downloadBlob"
    - "openExternal"
    - "openNative"
    - "toast"

ads:
  enabled: true
  provider: "admob"
  consent_mode: "ump" # "ump" or "none"
  global_banner:
    placement: "bottom" # "top" or "bottom"
    type: "adaptive" # "adaptive" or "collapsible"
  per_route_banners:
    - route: "/web/home"
      placement: "bottom"
      type: "collapsible"
      collapsible_details:
        position: "bottom" # or "top"
        max_height: 100

in_app_updates:
  enabled: true
  mode: "flexible" # "flexible" or "immediate"

error_handling:
  offline_page: "/native/offline"
  error_page: "/native/error"
  confirm_exit: true

routes:
  - id: "web_home"
    path: "/web/home"
    kind: "webview"
    label: "Home"
    icon: "home"
    url: "https://YOUR_PRIMARY_HOST_HERE"
    webview_opts:
      display_zoom_controls: true # Override global

  - id: "native_watchlist"
    path: "/native/watchlist"
    kind: "native"
    label: "Watchlist"
    icon: "star"

  - id: "native_portfolio"
    path: "/native/portfolio"
    kind: "native"
    label: "Portfolio"
    icon: "work"

  - id: "native_alerts"
    path: "/native/alerts"
    kind: "native"
    label: "Alerts"
    icon: "notifications"

  - id: "native_settings"
    path: "/native/settings"
    kind: "native"
    label: "Settings"
    icon: "settings"
