<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>You're offline</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #ffffff;
            --fg: #111111;
            --muted: #6b7280;
            --accent: #2563eb;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0b0b0c;
                --fg: #f5f5f5;
                --muted: #9ca3af;
                --accent: #60a5fa;
            }
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        main {
            max-width: 28rem;
            text-align: center;
        }
        .icon {
            font-size: 56px;
            line-height: 1;
            margin-bottom: 16px;
        }
        h1 { font-size: 22px; margin: 0 0 8px; }
        p { color: var(--muted); margin: 0 0 24px; line-height: 1.5; }
        button {
            background: var(--accent);
            color: white;
            border: 0;
            padding: 12px 20px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            min-width: 160px;
        }
        button:active { transform: translateY(1px); }
    </style>
</head>
<body>
    <main>
        <div class="icon" aria-hidden="true">&#128268;</div>
        <h1>You&rsquo;re offline</h1>
        <p>Check your connection and try again. The app will reload as soon as you&rsquo;re back online.</p>
        <button type="button" onclick="window.WebSightBridge ? window.location.reload() : window.location.reload()">Retry</button>
    </main>
</body>
</html>
